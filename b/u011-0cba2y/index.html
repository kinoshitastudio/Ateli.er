<h1>多賀大社</h1>
<p class="by">by <a href="https://atelistudio.com/ch/atelier-owner/">atelier-owner</a> on Ateli.er</p>
<p class="body-text">古くから「お多賀さん」の名で親しまれる滋賀県第一の大社です。日本最古の書物「古事記」によると、この両神は神代の昔に、初めて夫婦の道を始められ、我国の国土、続いて天照大神をはじめとする八百万（やおよろず）の神々をお産みになられました。このように、命の親神様であることから、古くから延命長寿、縁結び、厄除けの霊神として信仰を集め、鎌倉から江戸時代にかけては、武家や民衆の信仰が一気に広まりました。</p>
