<h1>ビョークやヌジャベスも愛したイタリアの至宝、ジジ・マシン。“アンビエントの巨匠”が明かす創作の原点と、「動き」に満ちた最新作の背景</h1>
<p class="by">by <a href="https://atelistudio.com/ch/atelier-owner/">atelier-owner</a> on Ateli.er</p>
<p class="body-text">水の都ヴェネツィアから、世界へ静かな波紋を広げ続ける音楽家、ジジ・マシン（Gigi Masin）。もし彼の名前を知らなくとも、その美しいサウンドに触れたことのある人は少なくないだろう。彼の楽曲は多彩なアーティストたちにサンプリングされ、時代やジャンルを超え響き渡ってきたからだ。</p>
