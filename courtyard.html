<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ateli.er — courtyard</title>
<meta name="description" content="All public audio from Ateli.er — sounds left half-finished, quietly listed.">
<meta property="og:type" content="website">
<meta property="og:title" content="Ateli.er — courtyard">
<meta property="og:description" content="All public audio from Ateli.er — sounds left half-finished, quietly listed.">
<meta property="og:image" content="https://atelistudio.com/og-image.png">
<meta property="og:url" content="https://atelistudio.com/courtyard.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ateli.er — courtyard">
<meta name="twitter:description" content="All public audio from Ateli.er — sounds left half-finished, quietly listed.">
<meta name="twitter:image" content="https://atelistudio.com/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #DCDBD5;
  --ink:       #1600A2;
  --gray:      rgba(22,0,162,.62);
  --gray-2:    rgba(22,0,162,.42);
  --gray-3:    rgba(22,0,162,.22);
  --line:      rgba(22,0,162,.32);
  --line-soft: rgba(22,0,162,.14);
  --ink-xsoft: rgba(22,0,162,.07);
  --sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); }
body { font-family: var(--sans); min-height: 100vh; padding-bottom: 60px; }

/* ── TOPBAR (mirrors app .topbar exactly) ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 22px 36px 18px;
  pointer-events: none;
  background: var(--bg);
}
.topbar > * { pointer-events: auto; }
.brand {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.02em;
  color: var(--ink);
  text-decoration: none;
  cursor: pointer;
}
.brand:hover { opacity: 0.55; }

/* triggers (mirrors app .triggers) */
.triggers {
  display: flex; gap: 24px;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.trig {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink);
  letter-spacing: 0.12em;
  text-transform: lowercase;
  padding: 2px 0;
  cursor: pointer;
  text-decoration: none;
  background: none; border: none;
  transition: opacity 0.2s;
  position: relative;
}
.trig:hover { opacity: 0.55; }
.trig.is-active {
  border-bottom: 1px solid var(--ink);
  opacity: 1;
}
.trig.close-btn { color: var(--gray); }
.trig.close-btn:hover { color: var(--ink); opacity: 1; }

/* ── MAIN CONTENT (padded to clear fixed topbar) ── */
#main {
  padding: 90px 36px 0;
}

/* pane head (mirrors .pane-head style) */
.pane-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line-soft);
}
.pane-head h3 {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 300;
  color: var(--ink);
  font-style: italic;
  letter-spacing: 0.01em;
}
.pane-meta {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 0.12em;
  text-transform: lowercase;
}

/* note text */
.section-note {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--gray);
  letter-spacing: 0.06em;
  line-height: 1.85;
  margin-bottom: 20px;
}
.section-note a {
  color: var(--ink); text-decoration: none;
  border-bottom: 1px solid var(--line-soft);
}
.section-note a:hover { border-color: var(--ink); }

/* ── AUDIO LIST (recent-posts style) ── */
#audio-list {
  list-style: none; padding: 0; margin: 0;
  font-family: var(--mono); font-size: 10.5px;
}
#audio-list li {
  padding: 6px 0;
  border-bottom: 1px dashed var(--gray-3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  transition: opacity .1s;
}
#audio-list li:hover { opacity: 0.65; }

.row-left {
  display: flex; align-items: center;
  gap: 8px; flex: 1; min-width: 0; color: var(--ink);
}
.row-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.row-icon  { flex-shrink: 0; color: var(--gray); }
.row-right {
  font-size: 10px; color: var(--gray-2);
  flex-shrink: 0; white-space: nowrap; text-align: right;
}

/* ── 5-bar stepped (chipmusic.org style) ── */
.bar5 {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.bar5 .seg {
  width: 3px;
  background: var(--line-soft);
}
.bar5 .seg:nth-child(1) { height: 4px; }
.bar5 .seg:nth-child(2) { height: 6px; }
.bar5 .seg:nth-child(3) { height: 8px; }
.bar5 .seg:nth-child(4) { height: 10px; }
.bar5 .seg:nth-child(5) { height: 12px; }
.bar5 .seg.on { background: var(--gray); }
li:hover .bar5 .seg.on { background: var(--ink); }

/* ── STATUS ── */
#status {
  padding: 32px 0;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: .14em; color: var(--gray-2); text-transform: uppercase;
}

@media (max-width: 560px) {
  .topbar { padding: 18px 20px 14px; }
  .triggers { gap: 14px; }
  .trig { font-size: 10px; }
  #main { padding: 80px 20px 0; }
  .trig.trig-hide-mobile { display: none; }
}
</style>
</head>
<body>

<!-- TOPBAR — mirrors app header exactly -->
<header class="topbar">
  <a class="brand" href="https://atelistudio.com/">Ateli.er</a>
  <nav class="triggers">
    <a class="trig trig-hide-mobile" href="https://atelistudio.com/">— my channel</a>
    <a class="trig trig-hide-mobile" href="https://atelistudio.com/">— feed</a>
    <a class="trig trig-hide-mobile" href="https://atelistudio.com/">— explore</a>
    <a class="trig trig-hide-mobile" href="https://atelistudio.com/">— comment</a>
    <a class="trig trig-hide-mobile" href="https://atelistudio.com/">— upload</a>
    <a class="trig is-active" href="/courtyard.html">— courtyard</a>
    <a class="trig close-btn" href="https://atelistudio.com/">— close</a>
  </nav>
</header>

<!-- MAIN -->
<main id="main">
  <div class="pane-head">
    <h3><em>Courtyard</em></h3>
    <span class="pane-meta">— audio from the courtyard</span>
  </div>

  <p class="section-note">
    未完成のまま、そっと置いておく音たち。 all public audio · newest on top.<br>
    <a href="https://atelistudio.com/player.html">↗ atelier player — ambient mode</a>
    &ensp;<a id="bmbrowser-link" href="#" style="display:none">↗ chrome extension</a>
  </p>

  <ul id="audio-list"></ul>
  <p id="status">Loading…</p>
</main>

<script>
(function () {
  const SUPABASE_URL = 'https://boaslcfdjdjaryahpged.supabase.co';
  const ANON_KEY     = 'sb_publishable_063kSonhC4HBJu-Dr3kUaw_4dRD7vPi';
  const CWS_URL      = 'https://chromewebstore.google.com/detail/atelier-player/gcanhohabiciialjlfigmpchoeeoeglb';
  const APP_URL      = 'https://atelistudio.com/';

  if (CWS_URL) {
    const a = document.getElementById('bmbrowser-link');
    a.href = CWS_URL; a.style.display = '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(ts) {
    const d = new Date(Number(ts));
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function bar5html(plays, maxPlays) {
    const filled = plays === 0 ? 0 : Math.max(1, Math.round((plays / maxPlays) * 5));
    return `<span class="bar5">${[1,2,3,4,5].map(i =>
      `<span class="seg${i <= filled ? ' on' : ''}"></span>`
    ).join('')}</span>`;
  }

  async function fetchAudio() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/public_blocks?kind=eq.audio&select=id,ts,payload,owner_handle,channel_label,play_count&order=ts.desc`,
      { headers: { apikey: ANON_KEY } }
    );
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  function render(tracks) {
    const list   = document.getElementById('audio-list');
    const status = document.getElementById('status');
    if (!tracks.length) { status.textContent = 'No audio yet.'; return; }

    const maxPlays = Math.max(1, ...tracks.map(t => t.play_count ?? 0));
    status.style.display = 'none';

    tracks.forEach(t => {
      const p      = t.payload || {};
      const title  = p.title || p.caption || '(untitled)';
      const handle = t.owner_handle ? `@${t.owner_handle}` : '';
      const ch     = t.channel_label || '';
      const date   = fmtDate(t.ts);
      const plays  = t.play_count ?? 0;
      const right  = [handle, ch, date].filter(Boolean).join(' · ');

      const li = document.createElement('li');
      li.innerHTML = `
        <span class="row-left">
          ${bar5html(plays, maxPlays)}
          <span class="row-icon">♪</span>
          <span class="row-title">${esc(title)}</span>
        </span>
        <span class="row-right">${esc(right)}</span>
      `;
      li.addEventListener('click', () => {
        window.location.href = `${APP_URL}s?type=block&id=${encodeURIComponent(t.id)}`;
      });
      list.appendChild(li);
    });
  }

  fetchAudio().then(render).catch(() => {
    document.getElementById('status').textContent = 'Could not load tracks.';
  });
})();
</script>
</body>
</html>
