<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ateli.er — courtyard</title>
<meta name="description" content="All public audio from Ateli.er — sounds left half-finished, quietly listed.">
<meta property="og:type" content="website">
<meta property="og:title" content="Ateli.er — courtyard">
<meta property="og:description" content="All public audio from Ateli.er — sounds left half-finished, quietly listed.">
<meta property="og:image" content="https://atelistudio.com/og-image.png">
<meta property="og:url" content="https://atelistudio.com/courtyard.html">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ateli.er — courtyard">
<meta name="twitter:description" content="All public audio from Ateli.er — sounds left half-finished, quietly listed.">
<meta name="twitter:image" content="https://atelistudio.com/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@200;300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #DCDBD5;
  --ink:       #1600A2;
  --ink-dim:   rgba(22,0,162,.62);
  --ink-faint: rgba(22,0,162,.32);
  --ink-soft:  rgba(22,0,162,.14);
  --ink-xsoft: rgba(22,0,162,.07);
  --sans: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--ink); }
body { font-family: var(--sans); min-height: 100vh; padding-bottom: 60px; }

/* ── HEADER ── */
#hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px 28px 18px;
  border-bottom: 1px solid var(--ink-soft);
}
#hd-logo {
  font-family: var(--mono); font-size: 11px; letter-spacing: .22em;
  color: var(--ink); text-decoration: none; text-transform: uppercase;
}
#hd-logo span { color: var(--ink-dim); }
#hd-nav { display: flex; gap: 20px; }
#hd-nav a {
  font-family: var(--mono); font-size: 10px; letter-spacing: .14em;
  color: var(--ink-dim); text-decoration: none; text-transform: uppercase; transition: color .15s;
}
#hd-nav a:hover { color: var(--ink); }

/* ── INNER WRAP (matches app modal pane padding) ── */
#wrap { padding: 0 28px; }

/* ── SECTION HEAD ── */
.section-head {
  margin: 18px 0 6px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--ink);
  letter-spacing: 0.04em;
}

/* ── NOTE TEXT (mirrors Traces/Explore bottom note) ── */
.section-note {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--ink-dim);
  letter-spacing: 0.06em;
  line-height: 1.85;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--ink-soft);
  padding-bottom: 14px;
}
.section-note a {
  color: var(--ink); text-decoration: none;
  border-bottom: 1px solid var(--ink-faint);
}
.section-note a:hover { border-color: var(--ink); }

/* ── LIST (mirrors recent-posts ul) ── */
#audio-list {
  list-style: none; padding: 0; margin: 0;
  font-family: var(--mono); font-size: 10.5px;
}
#audio-list li {
  padding: 6px 0;
  border-bottom: 1px dashed var(--ink-xsoft);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  transition: background .1s;
}
#audio-list li:hover { background: var(--ink-xsoft); margin: 0 -4px; padding-left: 4px; padding-right: 4px; }

.row-left {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
  min-width: 0;
  color: var(--ink);
}
.row-bar5 {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  flex-shrink: 0;
}
.row-bar5 .seg { width: 3px; height: 8px; background: var(--ink-xsoft); }
.row-bar5 .seg.on { background: var(--ink-faint); }
li:hover .row-bar5 .seg.on { background: var(--ink); }
.row-icon { flex-shrink: 0; color: var(--ink-dim); }
.row-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.row-right {
  font-size: 10px;
  color: var(--ink-faint);
  flex-shrink: 0;
  white-space: nowrap;
  text-align: right;
}
.row-right .r-handle { color: var(--ink-dim); }

/* ── STATUS ── */
#status {
  padding: 32px 0;
  font-family: var(--mono); font-size: 11px;
  letter-spacing: .14em; color: var(--ink-faint); text-transform: uppercase;
}
</style>
</head>
<body>

<header id="hd">
  <a id="hd-logo" href="https://atelistudio.com/">Ateli.er <span>— courtyard</span></a>
  <nav id="hd-nav">
    <a href="https://atelistudio.com/player.html">Player</a>
    <a href="https://atelistudio.com/">Open app →</a>
  </nav>
</header>

<div id="wrap">
  <h4 class="section-head">— audio</h4>
  <p class="section-note">
    未完成のまま、そっと置いておく音たち。 all public audio · newest on top.<br>
    <a href="https://atelistudio.com/player.html">↗ atelier player — ambient mode</a>
    &ensp;<a id="bmbrowser-link" href="#" style="display:none">↗ chrome extension</a>
  </p>

  <ul id="audio-list"></ul>
  <p id="status">Loading…</p>
</div>

<script>
(function () {
  const SUPABASE_URL = 'https://boaslcfdjdjaryahpged.supabase.co';
  const ANON_KEY     = 'sb_publishable_063kSonhC4HBJu-Dr3kUaw_4dRD7vPi';
  const CWS_URL      = 'https://chromewebstore.google.com/detail/atelier-player/gcanhohabiciialjlfigmpchoeeoeglb';
  const APP_URL      = 'https://atelistudio.com/';

  if (CWS_URL) {
    const a = document.getElementById('bmbrowser-link');
    a.href = CWS_URL; a.style.display = '';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(ts) {
    const d = new Date(Number(ts));
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function bar5(plays, maxPlays) {
    const filled = plays === 0 ? 0 : Math.max(1, Math.round((plays / maxPlays) * 5));
    return `<span class="row-bar5">${Array.from({length:5},(_,i)=>`<span class="seg${i<filled?' on':''}"></span>`).join('')}</span>`;
  }

  async function fetchAudio() {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/public_blocks?kind=eq.audio&select=id,ts,payload,owner_handle,channel_label,play_count&order=ts.desc`,
      { headers: { apikey: ANON_KEY } }
    );
    if (!res.ok) throw new Error(res.status);
    return res.json();
  }

  function render(tracks) {
    const list   = document.getElementById('audio-list');
    const status = document.getElementById('status');
    if (!tracks.length) { status.textContent = 'No audio yet.'; return; }

    const maxPlays = Math.max(1, ...tracks.map(t => t.play_count ?? 0));
    status.style.display = 'none';

    tracks.forEach(t => {
      const p      = t.payload || {};
      const title  = p.title || p.caption || '(untitled)';
      const handle = t.owner_handle ? `@${t.owner_handle}` : '';
      const ch     = t.channel_label || '';
      const date   = fmtDate(t.ts);
      const plays  = t.play_count ?? 0;

      const right  = [handle, ch, date].filter(Boolean).join(' · ');

      const li = document.createElement('li');
      li.innerHTML = `
        <span class="row-left">
          ${bar5(plays, maxPlays)}
          <span class="row-icon">♪</span>
          <span class="row-title">${esc(title)}</span>
        </span>
        <span class="row-right">${esc(right)}</span>
      `;
      li.addEventListener('click', () => {
        window.location.href = `${APP_URL}s?type=block&id=${encodeURIComponent(t.id)}`;
      });
      list.appendChild(li);
    });
  }

  fetchAudio().then(render).catch(() => {
    document.getElementById('status').textContent = 'Could not load tracks.';
  });
})();
</script>
</body>
</html>
